<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى زينب ❤️</title>
    <style>
        :root {
            --primary-pink: #ff85a2;
            --soft-pink: #ffeef2;
            --dark-bg: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--soft-pink);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* أنميشن القلوب في الخلفية */
        .bg-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .heart-particle {
            position: absolute;
            color: rgba(255, 133, 162, 0.4);
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 15px 40px rgba(255, 133, 162, 0.2);
            text-align: center;
            width: 85%;
            max-width: 380px;
            border: 4px solid #ffcad4;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .img-box {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .img-box img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 15px;
            object-fit: contain;
        }

        .message-box {
            background: var(--dark-bg);
            color: #fff;
            padding: 15px 20px;
            border-radius: 18px;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 25px;
            border: 2px solid var(--primary-pink);
            line-height: 1.4;
        }

        .btn {
            background: var(--primary-pink);
            color: white;
            border: none;
            padding: 12px 45px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 133, 162, 0.4);
            transition: 0.3s;
        }

        .btn:hover { transform: scale(1.1); }

        .hidden { display: none; }

        .big-heart {
            font-size: 100px;
            cursor: pointer;
            animation: heartbeat 1s infinite;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(255, 133, 162, 0.5));
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
    </style>
</head>
<body>

<div class="bg-hearts" id="bg"></div>

<div id="step1" class="card">
    <div class="img-box">
        <img src="https://static.wikia.nocookie.net/sanrio/images/9/9f/Hello_Kitty.jpg" alt="Kitty 1">
    </div>
    <div class="message-box">هلو زينب</div>
    <button class="btn" onclick="next(2)">هلووو</button>
</div>

<div id="step2" class="card hidden">
    <div class="img-box">
        <img src="https://lohsgrizzlygazette.com/wp-content/uploads/2024/12/Untitled_Artwork-2-1200x1200.jpg" alt="Kitty 2">
    </div>
    <div class="message-box">زينب عندي سؤال الجججج</div>
    <button class="btn" onclick="next(3)">شنو هو؟</button>
</div>

<div id="step3" class="card hidden">
    <div class="img-box">
        <img src="https://static.wikia.nocookie.net/hellokitty/images/5/52/Sanrio_Characters_Hello_Kitty_Image026.png" alt="Kitty 3">
    </div>
    <div class="message-box">بس مستحية اسألج اياه 😓</div>
    <button class="btn" onclick="next(4)">اسأليني</button>
</div>

<div id="step4" class="card hidden">
    <div class="img-box">
        <img src="https://static.wikia.nocookie.net/sanrio/images/9/9f/Hello_Kitty.jpg" alt="Kitty 4">
    </div>
    <div class="message-box">شنو هاا 😠 تحبين عبود لو لا؟</div>
    <button class="btn" onclick="next(5)">ها؟ 😳</button>
</div>

<div id="step5" class="card hidden">
    <div class="message-box">اذا تحبين عبود دوسي ع القلب</div>
    <div class="big-heart" onclick="next(6)">❤️</div>
</div>

<div id="step6" class="card hidden">
    <div class="img-box">
        <img src="https://lohsgrizzlygazette.com/wp-content/uploads/2024/12/Untitled_Artwork-2-1200x1200.jpg" alt="Kitty 5">
    </div>
    <div class="message-box">كلشي ولا ضوجتج زينب.. احبج ❤️</div>
    <button class="btn" onclick="alert('وأني هم أحبج يا عبود! ❤️')">أعشقج واحبج 🥺❤️</button>
</div>

<script>
    function next(s) {
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        document.getElementById('step' + s).classList.remove('hidden');
    }

    // توليد قلوب الخلفية عشوائياً
    const bg = document.getElementById('bg');
    for(let i=0; i<15; i++) {
        let h = document.createElement('div');
        h.className = 'heart-particle';
        h.innerHTML = '❤️';
        h.style.left = Math.random() * 100 + 'vw';
        h.style.animationDelay = Math.random() * 5 + 's';
        h.style.fontSize = (Math.random() * 20 + 10) + 'px';
        bg.appendChild(h);
    }
</script>

</body>
</html>
